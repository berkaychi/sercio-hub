<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Metin2 içerik üreticisi Sercio'nun tüm sosyal medya bağlantıları, YouTube videoları, aktif sunucu bilgileri ve Discord topluluğuna tek sayfadan ulaşın."
    />
    <meta name="theme-color" content="#ffd700" />
    <title>Sercio - Metin2 İçerik Üreticisi</title>

    <!-- Canonical URL -->
    <link rel="canonical" href="https://sercio.com.tr/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sercio - Metin2 İçerik Üreticisi" />
    <meta
      property="og:description"
      content="Metin2 içerik üreticisi Sercio'nun tüm sosyal medya bağlantıları, YouTube videoları, aktif sunucu bilgileri ve Discord topluluğuna tek sayfadan ulaşın."
    />
    <meta property="og:url" content="https://sercio.com.tr/" />
    <meta property="og:image" content="https://sercio.com.tr/og-image.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Sercio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sercio - Metin2 İçerik Üreticisi" />
    <meta
      name="twitter:description"
      content="Metin2 içerik üreticisi Sercio'nun tüm sosyal medya bağlantıları, YouTube videoları, aktif sunucu bilgileri ve Discord topluluğuna tek sayfadan ulaşın."
    />
    <meta name="twitter:image" content="https://sercio.com.tr/og-image.jpeg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfilePage",
        "mainEntity": {
          "@type": "Person",
          "name": "Sercio",
          "url": "https://sercio.com.tr",
          "image": "https://sercio.com.tr/og-image.jpeg",
          "description": "Metin2 içerik üreticisi",
          "sameAs": [
            "https://www.youtube.com/@Sercio-m4d",
            "https://www.instagram.com/sserciiomt2/",
            "https://discord.gg/sercio"
          ]
        }
      }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="logo.jpeg" />
    <link rel="apple-touch-icon" href="logo.jpeg" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

    <!-- FontAwesome (SRI + non-blocking) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      />
    </noscript>

    <!-- CSS (parallel loading — no @import waterfall) -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link rel="stylesheet" href="css/social-links.css" />
    <link rel="stylesheet" href="css/discord.css" />
    <link rel="stylesheet" href="css/videos.css" />
    <link rel="stylesheet" href="css/servers.css" />
    <link rel="stylesheet" href="css/duyurular.css" />
    <link rel="stylesheet" href="css/ep-panel.css" />
    <link rel="stylesheet" href="css/toplu-ep.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/utilities.css" />
    <link rel="stylesheet" href="css/responsive.css" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J0PXF81T46"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-J0PXF81T46');
    </script>
  </head>

  <body>
    <!-- Skip to content -->
    <a href="#main-content" class="skip-link">İçeriğe geç</a>

    <!-- Particles Canvas -->
    <canvas id="particles-canvas" aria-hidden="true"></canvas>

    <!-- Smoke/Mist Effect -->
    <div class="smoke-container" aria-hidden="true">
      <div class="smoke smoke-1"></div>
      <div class="smoke smoke-2"></div>
      <div class="smoke smoke-3"></div>
    </div>

    <!-- Background Animation -->
    <div class="background-animation" aria-hidden="true"></div>

    <div class="container">
      <!-- Profil Bölümü -->
      <header class="profile-section">
        <div class="profile-image">
          <img
            id="profileImage"
            src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
            alt="Sercio profil fotoğrafı"
            width="120"
            height="120"
          />
          <div class="profile-ring" aria-hidden="true"></div>
        </div>
        <h1 class="profile-name" id="profileName">Yükleniyor...</h1>
        <p class="profile-bio" id="profileBio">Bizi Takip Edin</p>
      </header>

      <!-- Ana İçerik Alanı -->
      <main id="main-content">
        <div class="main-content-grid">
          <!-- Sol Kolon - Bonuslu EP -->
          <section class="column discord-column" aria-label="Bonuslu EP Paneli">
            <div
              class="bonuslu-ep-panel"
              id="bonusluEpPanel"
              style="display: none"
            >
              <div class="ep-panel-header">
                <span class="ep-panel-icon" id="epPanelIcon" aria-hidden="true"
                  >🔥</span
                >
                <h2>BONUSLU EP ÇEKİMİ</h2>
                <span class="ep-live-badge" id="epLiveBadge">AKTİF</span>
              </div>
              <div class="ep-panel-content" id="epPanelContent">
                <!-- İçerik dinamik olarak yüklenir -->
              </div>
            </div>
          </section>

          <!-- Orta Kolon - Bağlantılar -->
          <section
            class="column center-column"
            aria-label="Sosyal Medya Bağlantıları"
          >
            <div class="social-links-wrapper">
              <h2 class="section-title">
                <span aria-hidden="true">🔗</span> Bağlantılar
              </h2>
              <nav
                class="social-links"
                id="socialLinks"
                aria-label="Sosyal medya bağlantıları"
              >
                <!-- Bağlantılar dinamik olarak yüklenir -->
              </nav>
            </div>
          </section>

          <!-- 3. Kolon - Duyurular -->
          <aside class="column duyurular-column" aria-label="Duyurular">
            <section class="duyurular-panel" aria-label="Duyurular">
              <h2 class="section-title">
                <span aria-hidden="true">📢</span> Duyurular
              </h2>
              <div class="duyurular-list" id="duyurularList">
                <!-- Duyurular dinamik olarak yüklenir -->
              </div>
            </section>
          </aside>

          <!-- 4. Kolon - Aktif Sunucular -->
          <section class="column servers-column" aria-label="Aktif Sunucular">
            <div class="servers-wrapper">
              <h2 class="section-title">
                <span aria-hidden="true">🎮</span> Aktif Oynadığımız Sunucular
              </h2>
              <div class="servers-grid" id="serversGrid">
                <!-- Sunucular dinamik olarak yüklenir -->
              </div>
            </div>
          </section>
        </div>

        <!-- Alt: YouTube Videoları -->
        <section class="youtube-section" aria-label="Son Videolar">
          <h2 class="section-title">
            <span aria-hidden="true">📺</span> Son Videolarım
          </h2>
          <div class="videos-grid" id="videosGrid">
            <!-- Videolar dinamik olarak yüklenir -->
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>&copy; 2026 Sercio. Tüm hakları saklıdır.</p>
      </footer>
    </div>

    <!-- Discord Pop-up Banner -->
    <a
      href="https://discord.gg/sercio"
      target="_blank"
      rel="noopener noreferrer"
      class="discord-popup"
      id="discordPopup"
      aria-label="Sercio Discord sunucusuna katıl"
    >
      <img
        src="dc.png"
        alt="Sercio Discord sunucusuna katıl"
        class="discord-popup-img"
        width="320"
        height="180"
        loading="lazy"
      />
    </a>

    <!-- Loading Spinner -->
    <div
      class="loading"
      id="loading"
      role="status"
      aria-label="İçerik yükleniyor"
    >
      <div class="spinner"></div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
